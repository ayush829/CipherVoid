<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevVault</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>

<body class="d-flex align-items-center justify-content-center animate-fade-in" style="min-height: 100vh; position: relative;">

<!-- Language Selector Dropdown -->
<div class="position-absolute top-0 end-0 p-3 d-flex align-items-center gap-2">
    <button class="theme-toggle-btn m-0 flex-shrink-0" onclick="toggleTheme()" title="Toggle Dark Mode" style="width: 38px; height: 38px;">🌙</button>
    <select id="langSelect" class="form-select bg-dark text-white border-secondary shadow-sm" onchange="changeLanguage(this.value)" style="width: auto; appearance: auto;">
        <option value="en">English</option>
        <option value="hi">हिन्दी (Hindi)</option>
        <option value="ja">日本語 (Japanese)</option>
        <option value="fr">Français (French)</option>
    </select>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="text-center mb-4">
                <h1 style="background: linear-gradient(135deg, #3b82f6, #60a5fa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; display: flex; justify-content: center; align-items: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="#3b82f6" class="bi bi-shield-lock-fill me-2" viewBox="0 0 16 16" style="-webkit-text-fill-color: initial;">
                        <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5"/>
                    </svg>
                    <span data-i18n="app_title">RevVault</span>
                </h1>
                <p class="text-secondary" data-i18n="app_subtitle">Secure Password Manager</p>
            </div>

            <div class="glass-card">
                <h3 class="text-center mb-4" data-i18n="welcome_back">Welcome Back</h3>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="username_label">Username</label>
                        <input type="text" class="form-control-custom" id="username" placeholder="Enter your username" data-i18n="username_placeholder" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" data-i18n="master_password_label">Master Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control-custom" id="password" placeholder="Enter master password" data-i18n="master_password_placeholder" required>
                            <span class="password-toggle" onclick="toggleVisibility('password')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
                            </span>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn-custom btn-primary-custom btn-lg" data-i18n="login_btn">
                            Login into Vault
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-secondary mb-1"><span data-i18n="new_to">New to RevVault?</span> <a href="register.html" class="text-info text-decoration-none" data-i18n="create_account">Create Account</a></p>
                    <a href="forgot-password.html" class="text-secondary text-decoration-none" style="font-size: 0.9rem;" data-i18n="forgot_password">Forgot Master Password?</a>
                </div>

                <div id="message" class="mt-3 text-danger text-center fw-bold"></div>
            </div>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>

<script>
    function toggleVisibility(id) {
        var input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
</script>
</body>
</html>
