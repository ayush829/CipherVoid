<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVoid - Secure Your Identity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
    <style>
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.05) 0, transparent 50%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        .landing-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3.5rem 2rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .brand-logo-small {
            width: 44px;
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-entry {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            padding: 16px 40px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }

        .btn-entry:hover {
            transform: translateY(-2px);
            color: white;
        }

        .theme-toggle-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

<div class="landing-card">
    <div class="theme-toggle-container">
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark Mode">🌙</button>
    </div>

    <div class="brand-header">
        <div class="brand-logo-small">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 5V11C4 16.5 7.5 21 12 22C16.5 21 20 16.5 20 11V5L12 2Z" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round"/>
                <circle cx="12" cy="11" r="2.5" fill="white"/>
                <rect x="11.5" y="13" width="1" height="4" rx="0.5" fill="white"/>
            </svg>
        </div>
        <h1 class="hero-title">CipherVoid</h1>
    </div>

    <p class="hero-subtitle">
        Secure your digital identity with military-grade encryption. 
        Your passwords, notes, and secrets protected.
    </p>
    <a href="login.html" class="btn-entry">Enter Your Vault</a>
</div>

</body>

</body>
</html>
