<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify 2FA - CipherVoid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        /* Custom modal for simulated OTP email */
        .otp-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            justify-content: center;
            align-items: center;
        }
        .otp-modal-content {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .otp-modal.show {
            display: flex;
        }
        .otp-modal.show .otp-modal-content {
            transform: scale(1);
        }
        .otp-display {
            font-size: 2.5rem;
            letter-spacing: 5px;
            font-weight: 800;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 20px 0;
            user-select: all;
        }
    </style>
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in d-flex align-items-center min-vh-100" style="background: var(--bg-color); position: relative;">

<!-- Theme Toggle -->
<div class="position-absolute top-0 end-0 p-3">
    <button class="theme-toggle-btn m-0" onclick="toggleTheme()" title="Toggle Theme" style="width: 38px; height: 38px;"></button>
</div>

<div class="container d-flex justify-content-center">

    <div class="glass-card w-100" style="max-width: 450px; padding: 3rem 2.5rem;">

        <div class="text-center mb-4">
            <div class="mb-3 d-inline-flex justify-content-center align-items-center rounded-circle" style="width: 60px; height: 60px; background: rgba(59, 130, 246, 0.2); color: #3b82f6; font-size: 1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-shield-lock-fill" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5"/>
                </svg>
            </div>
            <h3 class="fw-bold text-primary mb-1">Two-Factor Authentication</h3>
            <p class="text-secondary small">Your account has 2FA enabled. Please generate an OTP to verify your identity.</p>
        </div>

        <p id="msg" class="text-center text-danger fw-bold mb-3"></p>

        <div id="generateWrapper" class="text-center mb-3">
            <button class="btn-custom btn-outline-custom w-100 mb-2" onclick="generateOTP()">
                Generate 6-Digit OTP
            </button>
        </div>

        <div id="verifyWrapper" style="display: none;">
            <div class="mb-3">
                <label class="form-label fw-bold" style="color: var(--text-primary);">Enter 6-Digit Code</label>
                <input type="text" id="otpInput" class="form-control-custom text-center fs-4 letter-spacing-1" placeholder="• • • • • •" maxlength="6" onkeypress="if(event.key === 'Enter') verifyOTP()">
                <small class="text-secondary d-block mt-1">Code is valid for exactly 2 minutes.</small>
            </div>

            <button class="btn-custom btn-primary-custom w-100 mb-3" onclick="verifyOTP()">
                Verify and Login
            </button>
        </div>

        <div class="text-center mt-3">
            <a href="login.html" class="text-secondary text-decoration-none" style="font-size: 0.9rem;">Back to Login</a>
        </div>

    </div>

</div>

<!-- Simulated Email Popup -->
<div id="otpModal" class="otp-modal">
    <div class="otp-modal-content">
        <h4 class="fw-bold text-primary">Simulated Email</h4>
        <p class="text-secondary mb-1">We've received a request to log in to your RevVault account. Here is your OTP:</p>
        <div class="otp-display" id="otpDisplaySpan">000000</div>
        <button class="btn-custom btn-primary-custom w-100 mt-2" onclick="closeOtpModal()">Copy & Close</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username') || localStorage.getItem("tempUser");
    const msg = document.getElementById("msg");

    window.onload = function() {
        if(!username) {
            msg.innerText = "Error: No username provided.";
            document.getElementById("generateWrapper").style.display = 'none';
        }
    }

    function generateOTP() {
        msg.innerText = "Generating code...";
        msg.className = "text-center text-info fw-bold m-0";

        axios.get(API_BASE + "/generate-otp/" + username)
            .then(function(response) {
                if(response.data.success) {
                    msg.innerText = "OTP generated successfully.";
                    msg.className = "text-center text-success fw-bold m-0";
                    
                    document.getElementById("generateWrapper").style.display = 'none';
                    document.getElementById("verifyWrapper").style.display = 'block';

                    // Simulate the email arriving via popup
                    document.getElementById("otpDisplaySpan").innerText = response.data.data;
                    document.getElementById("otpModal").classList.add("show");
                } else {
                    msg.innerText = response.data.message || "Could not generate OTP.";
                    msg.className = "text-center text-danger fw-bold m-0";
                }
            })
            .catch(function(err) {
                console.error(err);
                if (err.response && err.response.data && err.response.data.message) {
                    msg.innerText = err.response.data.message;
                } else {
                    msg.innerText = "Error connecting to server to generate OTP.";
                }
                msg.className = "text-center text-danger fw-bold m-0";
            });
    }

    function closeOtpModal() {
        const generatedOtp = document.getElementById("otpDisplaySpan").innerText;
        navigator.clipboard.writeText(generatedOtp).catch(e => console.log("Clipboard write failed: ", e));
        document.getElementById("otpModal").classList.remove("show");
        document.getElementById("otpInput").focus();
    }

    function verifyOTP() {
        const otp = document.getElementById("otpInput").value.trim();

        if(!otp || otp.length !== 6) {
            msg.innerText = "Please enter a valid 6-digit OTP.";
            msg.className = "text-center text-danger fw-bold m-0";
            return;
        }

        msg.innerText = "Verifying...";
        msg.className = "text-center text-info fw-bold m-0";

        axios.post(API_BASE + "/verify-2fa", {
            username: username,
            otp: otp
        })
        .then(function(response){
            if (response.data.success) {
                const tokenResponse = response.data.data;
                localStorage.setItem("token", typeof tokenResponse === 'object' ? tokenResponse.token : tokenResponse);
                localStorage.setItem("username", username);
                window.location.href = "dashboard.html";
            } else {
                msg.innerText = response.data.message || "Invalid OTP.";
                msg.className = "text-center text-danger fw-bold m-0";
            }
        })
        .catch(function(err){
            console.log(err);
            if(err.response && err.response.data && err.response.data.message) {
                 msg.innerText = err.response.data.message;
            } else {
                 msg.innerText = "Verification failed. Incorrect OTP.";
            }
            msg.className = "text-center text-danger fw-bold m-0";
        });
    }
</script>

</body>
</html>
