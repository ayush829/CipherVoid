<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Password - CipherVoid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in">

    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="m-0 text-primary">Edit Password</h3>
                    <div class="d-flex align-items-center gap-2">
                        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"></button>
                        <button class="btn-custom btn-outline-custom" onclick="goBack()">← Back</button>
                    </div>
                </div>

                <div class="glass-card">
                    <form id="updateForm">

                        <div class="mb-3">
                            <label class="form-label">Account Name</label>
                            <input type="text" class="form-control-custom" id="accountName" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Website URL</label>
                            <input type="text" class="form-control-custom" id="website">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username / Email</label>
                            <input type="text" class="form-control-custom" id="username" autocomplete="off" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-flex justify-content-between">
                                <span>Password</span>
                                <a href="generate-password.html" class="text-info text-decoration-none"
                                    style="font-size:0.85rem;">Need a strong password?</a>
                            </label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-control-custom"
                                    autocomplete="new-password" required>
                                <span class="password-toggle" onclick="toggleVisibility('password')">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                        class="bi bi-eye-fill" viewBox="0 0 16 16">
                                        <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z" />
                                        <path
                                            d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" />
                                    </svg>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-control-custom" id="category">
                                <option>Social</option>
                                <option>Banking</option>
                                <option>Email</option>
                                <option>Shopping</option>
                                <option>Work</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control-custom" id="notes" rows="3"></textarea>
                        </div>

                        <button type="submit" class="btn-custom btn-primary-custom w-100 btn-lg">
                            Update Password
                        </button>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/edit-password.js"></script>

</body>

</html>
