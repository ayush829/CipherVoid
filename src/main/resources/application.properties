# ===============================
# DYNAMIC DATABASE CONFIGURATION
# ===============================

# These values will be overridden by Cloud Environment Variables (if they exist)
# Default is your local Oracle setup for safety
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/orcl21}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:system}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ayush2501}

# Hibernate automatically detects the database type, but we can override it if metadata fails
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS:oracle.jdbc.OracleDriver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=${PORT:8080}