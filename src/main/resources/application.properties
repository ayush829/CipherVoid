server.port=${PORT:8080}
spring.application.name=passwordmanager

# Database Configuration (Dynamic for Cloud, Fallback to Local Oracle)
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/orcl21}
spring.datasource.username=${DB_USERNAME:system}
spring.datasource.password=${DB_PASSWORD:Ayush2501}
spring.datasource.driver-class-name=${DB_DRIVER:oracle.jdbc.OracleDriver}

# JPA/Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.OracleDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.tomcat.max-http-form-post-size=2MB

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=8080