<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Master Password - CipherVoid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in">

<div class="container py-5">
    
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="m-0 text-primary">Change Master Password</h3>
                <button class="btn-custom btn-outline-custom" onclick="window.history.back()">← Back</button>
            </div>

            <div class="glass-card">
                <p class="text-secondary mb-4">Update your master password to keep your vault secure.</p>

                <div class="mb-3">
                    <label class="form-label">Current Master Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="currentPassword" class="form-control-custom" placeholder="Enter current password">
                        <span class="password-toggle" onclick="toggleVisibility('currentPassword')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">New Master Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" class="form-control-custom" placeholder="Enter new strong password">
                        <span class="password-toggle" onclick="toggleVisibility('newPassword')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
                        </span>
                    </div>
                </div>

                <button class="btn-custom btn-warning w-100 fw-bold" onclick="changePassword()" style="background: rgba(245, 158, 11, 0.9); color: #fff; border:none; padding:12px;">
                    Update Master Password
                </button>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>

<script>
    function changePassword(){
        axios.put(API_BASE + "/change-master-password", {
            currentPassword: document.getElementById("currentPassword").value,
            newPassword: document.getElementById("newPassword").value
        }, { headers: { Authorization: "Bearer " + localStorage.getItem("token") } })
        .then(function(){
            alert("Password updated successfully");
            window.location.href="dashboard.html";
        })
        .catch(function(){
            alert("Failed to update password. Check your current password.");
        });
    }
</script>

<script>
    function toggleVisibility(id) {
        var input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
</script>
</body>
</html>
