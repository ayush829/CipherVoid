<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CipherVoid</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="d-flex align-items-center justify-content-center animate-fade-in" style="min-height: 100vh; position: relative;">

<!-- Language Selector Dropdown -->
<div class="position-absolute top-0 end-0 p-3 d-flex align-items-center gap-2">
    <button class="theme-toggle-btn m-0 flex-shrink-0" onclick="toggleTheme()" title="Toggle Theme" style="width: 38px; height: 38px;"></button>
    <select id="langSelect" class="form-select bg-dark text-white border-secondary shadow-sm" onchange="changeLanguage(this.value)" style="width: auto; appearance: auto;">
        <option value="en">English</option>
        <option value="hi">हिन्दी (Hindi)</option>
        <option value="ja">日本語 (Japanese)</option>
        <option value="fr">Français (French)</option>
    </select>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="text-center mb-4">
                <h1 style="background: linear-gradient(135deg, #3b82f6, #60a5fa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 12px;">
                    <div style="background: white; padding: 4px; border-radius: 8px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L4 5V11C4 16.5 7.5 21 12 22C16.5 21 20 16.5 20 11V5L12 2Z" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round"/>
                            <circle cx="12" cy="11" r="2.5" fill="white"/>
                            <rect x="11.5" y="13" width="1" height="4" rx="0.5" fill="white"/>
                        </svg>
                    </div>
                    <span data-i18n="app_title">CipherVoid</span>
                </h1>
                <p class="text-secondary" data-i18n="app_subtitle">The Ultimate Password Shield</p>
            </div>

            <div class="glass-card">
                <h3 class="text-center mb-4" data-i18n="welcome_back">Welcome Back</h3>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="username_label">Username</label>
                        <input type="text" class="form-control-custom" id="username" placeholder="Enter your username" data-i18n="username_placeholder" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" data-i18n="master_password_label">Master Password</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control-custom" id="password" placeholder="Enter master password" data-i18n="master_password_placeholder" required>
                            <span class="password-toggle" onclick="toggleVisibility('password')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
                            </span>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn-custom btn-primary-custom btn-lg" data-i18n="login_btn">
                            Login into Vault
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-secondary mb-1"><span data-i18n="new_to">New to CipherVoid?</span> <a href="register.html" class="text-info text-decoration-none" data-i18n="create_account">Create Account</a></p>
                    <a href="forgot-password.html" class="text-secondary text-decoration-none" style="font-size: 0.9rem;" data-i18n="forgot_password">Forgot Master Password?</a>
                </div>

                <div id="message" class="mt-3 text-danger text-center fw-bold"></div>
            </div>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>

<script>
    function toggleVisibility(id) {
        var input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
</script>
</body>
</html>
