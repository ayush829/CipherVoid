<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CipherVoid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="m-0 text-primary">Your Profile</h3>
                <div class="d-flex align-items-center gap-2">
                    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"></button>
                    <button class="btn-custom btn-outline-custom" onclick="window.location.href='dashboard.html'">← Dashboard</button>
                </div>
            </div>

            <div class="glass-card mb-4">
                <h5 class="mb-4">Personal Information</h5>
                
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" id="name" class="form-control-custom" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control-custom" readonly>
                </div>

                <div class="mb-4">
                    <label class="form-label">Phone Number</label>
                    <input type="text" id="phone" class="form-control-custom" readonly>
                </div>

                <div class="d-flex gap-2">
                    <button id="editBtn" class="btn-custom btn-outline-custom w-100" onclick="enableEdit()">
                        Edit Profile
                    </button>
                    <button id="saveBtn" class="btn-custom btn-primary-custom w-100" onclick="updateProfile()" style="display: none;">
                        Save Changes
                    </button>
                    <button id="cancelBtn" class="btn-custom btn-outline-custom w-100 text-danger" onclick="cancelEdit()" style="display: none; border-color: rgba(239, 68, 68, 0.4);">
                        Cancel
                    </button>
                </div>
            </div>

            <div class="glass-card border-warning">
                <h5 class="text-warning mb-4">Security Settings</h5>

                <div class="d-flex justify-content-between align-items-center bg-dark p-3 rounded mb-3" style="background: rgba(0,0,0,0.2) !important;">
                    <div>
                        <h6 class="m-0">Two-Factor Authentication</h6>
                        <small class="text-secondary">Add an extra layer of security</small>
                    </div>
                    <div class="form-check form-switch fs-4 m-0">
                        <input class="form-check-input" type="checkbox" id="twoFactorToggle">
                    </div>
                </div>

                <button class="btn-custom btn-outline-custom w-100" onclick="toggle2FA()">
                    Update 2FA Status
                </button>
                
            </div>

            <div class="glass-card border-danger mt-4">
                <h5 class="text-danger mb-4">Danger Zone</h5>
                <p class="text-secondary small mb-4">
                    Deleting your account will permanently remove all your saved passwords, settings, and personal data. This action cannot be undone.
                </p>
                <button class="btn-custom btn-danger-custom w-100" onclick="deleteAccount()">
                    Delete Master Account Completely
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script src="js/profile.js"></script>

<script>
    function updateProfile(){
        axios.put(API_BASE + "/update-profile", {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value
        }, getAuthHeader())
        .then(function(){
            alert("Profile updated successfully");
            window.location.href="dashboard.html";
        })
        .catch(function(){
            alert("Update failed");
        });
    }
</script>

</body>
</html>
