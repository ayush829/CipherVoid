<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Password - CipherVoid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in">

    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="m-0 text-primary">Add New Password</h3>
                    <div class="d-flex align-items-center gap-2">
                        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"></button>
                        <button class="btn-custom btn-outline-custom" onclick="goDashboard()">← Back to Vault</button>
                    </div>
                </div>

                <div class="glass-card">
                    <form id="passwordForm">

                        <div class="mb-3">
                            <label class="form-label">Account Name (e.g., Netflix, Google)</label>
                            <input type="text" class="form-control-custom" id="accountName"
                                placeholder="Enter account name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Website URL</label>
                            <input type="text" class="form-control-custom" id="website" placeholder="example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username / Email</label>
                            <input type="text" class="form-control-custom" id="username"
                                placeholder="Enter username or email" autocomplete="off" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-flex justify-content-between">
                                <span>Password</span>
                                <a href="generate-password.html" class="text-info text-decoration-none"
                                    style="font-size:0.85rem;">Need a strong password?</a>
                            </label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-control-custom"
                                    placeholder="Enter password" onkeyup="checkStrength()" autocomplete="new-password"
                                    required>
                                <span class="password-toggle" onclick="toggleVisibility('password')">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                                        class="bi bi-eye-fill" viewBox="0 0 16 16">
                                        <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z" />
                                        <path
                                            d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" />
                                    </svg>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password Strength</label>
                            <input type="text" id="strength" class="form-control-custom"
                                style="background: rgba(0,0,0,0.2);" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-control-custom" id="category">
                                <option>Social</option>
                                <option>Banking</option>
                                <option>Email</option>
                                <option>Shopping</option>
                                <option>Work</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Notes (Optional)</label>
                            <textarea class="form-control-custom" id="notes" rows="3"
                                placeholder="Any extra information..."></textarea>
                        </div>

                        <button id="saveBtn" type="submit" class="btn-custom btn-primary-custom w-100 btn-lg">
                            Save to Vault
                        </button>

                        <div id="msg" class="mt-3 text-success text-center fw-bold"></div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/password.js"></script>

    <script>
        window.onload = function () {
            const generated = localStorage.getItem("generatedPassword");
            if (generated) {
                document.getElementById("password").value = generated;
                if (typeof checkStrength === 'function') checkStrength();
                localStorage.removeItem("generatedPassword");
            }
        }
    </script>

    <script>
        function toggleVisibility(id) {
            var input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
</body>

</html>
