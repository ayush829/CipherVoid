<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - CipherVoid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in">

<div class="container py-5">
    
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="m-0 text-primary">Password Generator</h3>
                <button class="btn-custom btn-outline-custom" onclick="window.history.back()">← Back</button>
            </div>

            <div class="glass-card mb-4 text-center">
                <input type="text" id="generatedPassword" class="form-control-custom text-center mb-3" style="font-size: 1.5rem; letter-spacing: 2px; font-family: monospace;" readonly placeholder="Your password will appear here">
                
                <div class="d-flex justify-content-center gap-2">
                    <button class="btn-custom btn-primary-custom" onclick="generatePassword()">Generate New</button>
                    <button class="btn-custom btn-success" style="background:#10b981; color:white; border:none;" onclick="copyPassword()">Copy</button>
                    <button class="btn-custom btn-outline-custom" onclick="saveGeneratedPassword()">Use & Save</button>
                </div>
            </div>

            <div class="glass-card">
                <h5 class="mb-4">Settings</h5>
                
                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        <span>Password Length</span>
                        <span class="text-info fw-bold" id="lengthDisplay">16</span>
                    </label>
                    <input type="range" class="form-range" id="lengthSlider" min="8" max="64" value="16" oninput="document.getElementById('length').value=this.value; document.getElementById('lengthDisplay').innerText=this.value;">
                    <input type="number" id="length" class="d-none" value="16">
                </div>

                <div class="d-flex flex-column gap-3">
                    <div class="form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" id="uppercase" checked>
                        <label class="form-check-label ms-2 text-primary">Include Uppercase (A-Z)</label>
                    </div>

                    <div class="form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" id="numbers" checked>
                        <label class="form-check-label ms-2 text-primary">Include Numbers (0-9)</label>
                    </div>

                    <div class="form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" id="symbols" checked>
                        <label class="form-check-label ms-2 text-primary">Include Symbols (!@#$)</label>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    // Just sync the range display on start
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('lengthDisplay').innerText = document.getElementById('lengthSlider').value;
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/generator.js"></script>

</body>
</html>
