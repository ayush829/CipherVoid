<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Audit - CipherVoid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in">

<div class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn-custom btn-outline-custom" onclick="goDashboard()">← Back to Vault</button>
        <h3 class="m-0 text-primary">Security Audit Report</h3>
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"></button>
    </div>

    <!-- Overview Score -->
    <div class="row mb-4 justify-content-center">
        <div class="col-md-6 text-center">
            <div class="glass-card py-5">
                <h5 class="text-secondary mb-3">Overall Security Score</h5>
                <h1 id="auditScore" class="m-0 display-1 fw-bold text-success">--</h1>
                <p class="text-muted mt-2">Score out of 100 based on password strength and uniqueness.</p>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        
        <div class="col-md-6">
            <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="text-danger m-0">Weak Passwords</h5>
                    <span class="badge bg-danger fs-6 rounded-pill" id="auditWeak">0</span>
                </div>
                <div id="weakList" style="max-height: 200px; overflow-y: auto;" class="text-secondary">
                    Loading...
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="text-warning m-0">Reused Passwords</h5>
                    <span class="badge bg-warning text-dark fs-6 rounded-pill" id="auditReuse">0</span>
                </div>
                <div id="reusedList" style="max-height: 200px; overflow-y: auto;" class="text-secondary">
                    Loading...
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script src="js/audit.js"></script>

</body>
</html>
