<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CipherVoid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/theme.js"></script>
</head>

<body class="animate-fade-in d-flex align-items-center min-vh-100" style="background: var(--bg-color);">

<div class="container d-flex justify-content-center">

    <div class="glass-card w-100" style="max-width: 450px; padding: 2.5rem;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Recover Password</h2>
            <p class="text-secondary">Answer your security questions to reset your master password.</p>
        </div>

        <div id="usernameSection">
            <div class="mb-4">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control-custom" placeholder="Enter your username">
            </div>

            <button class="btn-custom btn-primary-custom w-100" onclick="loadQuestions()">
                Continue
            </button>
            <div class="text-center mt-3">
                <a href="login.html" class="text-secondary text-decoration-none">Back to Login</a>
            </div>
        </div>

        <div id="questionSection" style="display:none;" class="animate-fade-in">
            <hr class="border-secondary my-4">

            <div class="mb-3">
                <label id="q1" class="form-label text-info fw-bold"></label>
                <input type="text" id="a1" class="form-control-custom" placeholder="Your Answer">
            </div>

            <div class="mb-3">
                <label id="q2" class="form-label text-info fw-bold"></label>
                <input type="text" id="a2" class="form-control-custom" placeholder="Your Answer">
            </div>

            <div class="mb-3">
                <label id="q3" class="form-label text-info fw-bold"></label>
                <input type="text" id="a3" class="form-control-custom" placeholder="Your Answer">
            </div>

            <div class="mb-4">
                <label class="form-label">New Master Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" class="form-control-custom" placeholder="Enter new strong password">
                    <span class="password-toggle" onclick="toggleVisibility('newPassword')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
                    </span>
                </div>
            </div>

            <button class="btn-custom btn-success w-100 fw-bold" onclick="resetPassword()" style="background: rgba(16, 185, 129, 0.9); border:none; padding:12px;">
                Reset Master Password
            </button>
        </div>

        <p id="msg" class="text-center text-danger mt-3 fw-bold"></p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/config.js"></script>
<script src="js/forgot-password.js"></script>

<script>
    function toggleVisibility(id) {
        var input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
</script>

</body>
</html>
